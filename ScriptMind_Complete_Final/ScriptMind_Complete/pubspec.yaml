name: scriptmind
description: ScriptMind - Intelligent Multilingual Mobile Learning System for Early Childhood Education in Sri Lanka
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3

  # Haptic / Vibration Feedback
  vibration: ^3.1.8

  # UI & Animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  animated_text_kit: ^4.2.2
  confetti: ^0.7.0
  smooth_page_indicator: ^1.2.0+3

  # Drawing Canvas
  flutter_drawing_board: ^0.9.0

  # Audio
  just_audio: ^0.9.36

  # Text-to-Speech (Pronunciation) ← NEW
  flutter_tts: ^4.0.2

  # Charts
  fl_chart: ^0.68.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/english/
    - assets/sounds/sinhala/
    - assets/sounds/tamil/
    - assets/animations/
