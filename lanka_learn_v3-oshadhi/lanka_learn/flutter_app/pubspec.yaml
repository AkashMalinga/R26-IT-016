name: lanka_learn
description: Lanka Learn - AI Intelligent Learning App for Sri Lankan History
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.4

  # HTTP
  http: ^1.2.1
  dio: ^5.4.3+1

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.67.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10

  # TTS / Audio
  flutter_tts: ^4.0.2
  audioplayers: ^6.0.0

  # Utils
  intl: ^0.19.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/maps/

  # fonts:
  #   - family: BalooBhai2
  #     fonts:
  #       - asset: assets/fonts/BalooBhai2-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/BalooBhai2-Bold.ttf
  #         weight: 700
  # ↑ Uncomment after placing font files in assets/fonts/ from fonts.google.com
